<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hardware vs Software Quiz</title>
  <style>
/* ═══════════════════════════════════════════════
   Hardware vs Software Quiz — CSS
   Mobile-First | Dark Mode | Neon Accents
   ═══════════════════════════════════════════════ */

:root {
  --hw:        #3B9EFF;
  --hw-glow:   #3B9EFF44;
  --sw:        #4EE887;
  --sw-glow:   #4EE88744;
  --bg:        #0B0E18;
  --bg-2:      #12162A;
  --bg-3:      #1C2040;
  --text:      #E8ECF9;
  --muted:     #6B7299;
  --danger:    #FF4F6A;
  --gold:      #FFD166;
  --radius:    14px;
  --radius-xl: 24px;
  --font:      'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── HUD ── */
.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 10px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--bg-3);
  flex-shrink: 0;
  z-index: 10;
}

.hud__label {
  display: block;
  font-size: 9px;
  letter-spacing: .12em;
  color: var(--muted);
  text-transform: uppercase;
}

.hud__value {
  display: block;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--gold);
  line-height: 1;
}

.hud__title {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 5px;
}

.hud__brand        { color: var(--hw); }
.hud__brand--sw    { color: var(--sw); }
.hud__sep          { color: var(--muted); font-weight: 400; font-size: 11px; }

.hud__lives { display: flex; gap: 4px; font-size: 20px; }

.life {
  transition: opacity .3s, transform .3s;
  color: var(--danger);
  filter: drop-shadow(0 0 4px var(--danger));
}

.life.lost {
  opacity: .18;
  transform: scale(.8);
  filter: none;
}

/* ── Arena ── */
.arena {
  flex: 1;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #1a2040 0%, transparent 70%),
    var(--bg);
}

.arena::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--bg-3) 1px, transparent 1px),
    linear-gradient(90deg, var(--bg-3) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: .3;
  pointer-events: none;
}

/* ── Itens ── */
.falling-item {
  position: absolute;
  top: -120px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: fall linear forwards;
  cursor: default;
  will-change: transform, top;
  pointer-events: none;
}

.item-bubble {
  width: 82px;
  height: 82px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: var(--bg-2);
  border: 2px solid var(--bg-3);
  position: relative;
  overflow: hidden;
  transition: border-color .15s;
}

.item-bubble::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  opacity: 0;
  transition: opacity .3s;
}

.item-bubble[data-type="hardware"]::before { background: var(--hw-glow); }
.item-bubble[data-type="software"]::before { background: var(--sw-glow); }
.item-bubble:hover::before { opacity: 1; }

.item-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .04em;
  color: var(--text);
  text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
  max-width: 90px;
  line-height: 1.2;
}

.arena::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 3px;
  background: var(--danger);
  box-shadow: 0 0 12px var(--danger);
}

@keyframes fall {
  from { top: -120px; }
  to   { top: calc(100% + 10px); }
}

/* ── Feedback ── */
.feedback {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(.6);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 10px 24px;
  border-radius: 40px;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: none;
}

.feedback.show-correct {
  background: var(--sw);
  color: #081a0f;
  box-shadow: 0 0 30px var(--sw-glow);
  animation: popFeedback .8s ease forwards;
}

.feedback.show-wrong {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 0 30px #FF4F6A44;
  animation: popFeedback .8s ease forwards;
}

@keyframes popFeedback {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(.6); }
  20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(.8); }
}

/* ── Streak ── */
.streak {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  background: rgba(255, 209, 102, .12);
  border: 1px solid rgba(255, 209, 102, .25);
  border-radius: 20px;
  padding: 4px 12px;
  opacity: 0;
  transition: opacity .3s;
}

.streak.visible { opacity: 1; }

/* ── Botões ── */
.controls {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: var(--bg-2);
  border-top: 1px solid var(--bg-3);
  flex-shrink: 0;
  z-index: 10;
}

.btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 72px;
  border: none;
  border-radius: var(--radius-xl);
  cursor: pointer;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  transition: transform .1s, box-shadow .1s, filter .1s;
  position: relative;
  overflow: hidden;
}

.btn:active { transform: scale(.96); }

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  border-radius: inherit;
  transition: opacity .3s;
}

.btn:active::after { opacity: .1; }

.btn__icon  { font-size: 24px; line-height: 1; }
.btn__label { line-height: 1; }

.btn--hw {
  background: var(--hw);
  color: #05111f;
  box-shadow: 0 4px 24px var(--hw-glow);
}

.btn--hw:hover { box-shadow: 0 6px 32px var(--hw-glow); filter: brightness(1.1); }

.btn--sw {
  background: var(--sw);
  color: #051408;
  box-shadow: 0 4px 24px var(--sw-glow);
}

.btn--sw:hover { box-shadow: 0 6px 32px var(--sw-glow); filter: brightness(1.1); }

/* ── Overlay ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .75);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 24px;
  animation: fadeIn .25s ease;
}

.overlay[hidden] { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.overlay__card {
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-xl);
  padding: 32px 24px 28px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  animation: slideUp .3s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.overlay__emoji { font-size: 52px; margin-bottom: 12px; }

.overlay__title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.15;
  margin-bottom: 8px;
  color: var(--text);
}

.overlay__sub {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.5;
}

.overlay__rules {
  list-style: none;
  text-align: left;
  background: var(--bg);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.overlay__rules li { font-size: 13px; color: var(--muted); line-height: 1.4; }
.overlay__rules li b { color: var(--text); }

.overlay__score-wrap {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 24px;
}

.overlay__score-label {
  display: block;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.overlay__score-value {
  display: block;
  font-size: 40px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: -.03em;
}

.overlay__btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--hw), var(--sw));
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: #081510;
  cursor: pointer;
  transition: transform .1s, filter .1s;
}

.overlay__btn:active { transform: scale(.97); }
.overlay__btn:hover  { filter: brightness(1.08); }

/* ── Animações extra ── */
.arena.flash-wrong { animation: arenaFlash .35s ease; }

@keyframes arenaFlash {
  0%, 100% { background-color: transparent; }
  40%       { background-color: rgba(255, 79, 106, .15); }
}

@keyframes correctPop {
  0%   { transform: translateX(-50%) scale(1);   opacity: 1; }
  50%  { transform: translateX(-50%) scale(1.3); opacity: .8; }
  100% { transform: translateX(-50%) scale(0);   opacity: 0; }
}

@keyframes wrongShake {
  0%,100% { transform: translateX(-50%); }
  25%      { transform: translateX(calc(-50% + 8px)); }
  75%      { transform: translateX(calc(-50% - 8px)); }
}

/* ── Responsivo ── */
@media (min-width: 480px) {
  .btn { height: 80px; }
  .btn__icon  { font-size: 28px; }
  .btn__label { font-size: 16px; }
}

@media (min-width: 768px) {
  body { max-width: 420px; margin: 0 auto; }
}
  </style>
</head>
<body>

  <!-- HUD: Pontuação e Vidas -->
  <header class="hud">
    <div class="hud__score">
      <span class="hud__label">PONTOS</span>
      <span class="hud__value" id="score">0</span>
    </div>
    <div class="hud__title">
      <span class="hud__brand">HW</span>
      <span class="hud__sep">vs</span>
      <span class="hud__brand hud__brand--sw">SW</span>
    </div>
    <div class="hud__lives" id="lives-display">
      <span class="life">♥</span>
      <span class="life">♥</span>
      <span class="life">♥</span>
    </div>
  </header>

  <!-- Área de jogo -->
  <main class="arena" id="arena" aria-live="polite" aria-label="Área de jogo">
    <div class="feedback" id="feedback" aria-hidden="true"></div>
    <div class="streak"   id="streak"   aria-hidden="true"></div>
  </main>

  <!-- Botões fixos no rodapé -->
  <footer class="controls">
    <button class="btn btn--hw" id="btn-hardware" aria-label="Hardware">
      <span class="btn__icon">⚙</span>
      <span class="btn__label">Hardware</span>
    </button>
    <button class="btn btn--sw" id="btn-software" aria-label="Software">
      <span class="btn__icon">💾</span>
      <span class="btn__label">Software</span>
    </button>
  </footer>

  <!-- Ecrã de Game Over -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-title" hidden>
    <div class="overlay__card">
      <p class="overlay__emoji" id="overlay-emoji">💀</p>
      <h2 class="overlay__title" id="overlay-title">Game Over</h2>
      <p class="overlay__sub" id="overlay-sub">Ficaste sem vidas!</p>
      <div class="overlay__score-wrap">
        <span class="overlay__score-label">Pontuação Final</span>
        <span class="overlay__score-value" id="overlay-score">0</span>
      </div>
      <button class="overlay__btn" id="restart-btn">Jogar Novamente</button>
    </div>
  </div>

  <!-- Ecrã de Início -->
  <div class="overlay" id="start-overlay" role="dialog" aria-modal="true" aria-labelledby="start-title">
    <div class="overlay__card">
      <p class="overlay__emoji">🖥️</p>
      <h2 class="overlay__title" id="start-title">Hardware<br><span style="color:var(--sw)">vs</span><br>Software</h2>
      <p class="overlay__sub">Classifica os componentes antes que saiam do ecrã!</p>
      <ul class="overlay__rules">
        <li>⚙️ <b>Hardware</b> = componentes físicos</li>
        <li>💾 <b>Software</b> = programas e sistemas</li>
        <li>❤️ Tens 3 vidas — não deixes nada passar</li>
      </ul>
      <button class="overlay__btn" id="start-btn">Começar</button>
    </div>
  </div>

  <script>
/* ═══════════════════════════════════════════════════════════════
   Hardware vs Software Quiz — JavaScript
   Vanilla JS puro | Comentado para fins pedagógicos
   ═══════════════════════════════════════════════════════════════ */

/* ── 1. BANCO DE DADOS DOS ITENS ─────────────────────────────────
   Cada item tem:
   - name:  nome exibido no ecrã
   - emoji: ícone visual
   - type:  "hardware" ou "software" (a resposta correta)
   ─────────────────────────────────────────────────────────────── */
const ITEMS = [
  /* Hardware (componentes físicos) */
  { name: "CPU",           emoji: "⚡", type: "hardware" },
  { name: "RAM",           emoji: "💡", type: "hardware" },
  { name: "SSD",           emoji: "💾", type: "hardware" },
  { name: "GPU",           emoji: "🎮", type: "hardware" },
  { name: "Placa-mãe",     emoji: "🔌", type: "hardware" },
  { name: "HDD",           emoji: "🗄️", type: "hardware" },
  { name: "ULA",           emoji: "🔢", type: "hardware" },
  { name: "Fonte ATX",     emoji: "⚡", type: "hardware" },
  { name: "Cooler",        emoji: "❄️", type: "hardware" },
  { name: "Monitor",       emoji: "🖥️", type: "hardware" },
  { name: "Teclado",       emoji: "⌨️", type: "hardware" },
  { name: "Memória VRAM",  emoji: "🧠", type: "hardware" },
  { name: "USB",           emoji: "🔌", type: "hardware" },
  { name: "Placa de Som",  emoji: "🔊", type: "hardware" },
  { name: "Registos CPU",  emoji: "📟", type: "hardware" },

  /* Software (programas e sistemas) */
  { name: "Windows",       emoji: "🪟", type: "software" },
  { name: "Linux",         emoji: "🐧", type: "software" },
  { name: "Android",       emoji: "🤖", type: "software" },
  { name: "macOS",         emoji: "🍎", type: "software" },
  { name: "Python",        emoji: "🐍", type: "software" },
  { name: "Java",          emoji: "☕", type: "software" },
  { name: "VS Code",       emoji: "📝", type: "software" },
  { name: "Chrome",        emoji: "🌐", type: "software" },
  { name: "Git",           emoji: "🌿", type: "software" },
  { name: "MySQL",         emoji: "🗃️", type: "software" },
  { name: "Compilador",    emoji: "⚙️", type: "software" },
  { name: "Driver",        emoji: "📦", type: "software" },
  { name: "BIOS/UEFI",     emoji: "🔧", type: "software" },
  { name: "Kernel",        emoji: "🫀", type: "software" },
  { name: "Antivírus",     emoji: "🛡️", type: "software" },
];

/* ── 2. ESTADO DO JOGO ────────────────────────────────────────────
   Estas variáveis guardam toda a informação do estado atual.
   ─────────────────────────────────────────────────────────────── */
let score        = 0;
let lives        = 3;
let streak       = 0;
let gameRunning  = false;
let spawnTimer   = null;
let activeItems  = [];
let difficulty   = 1;
let diffTimer    = null;

/* ── 3. REFERÊNCIAS AOS ELEMENTOS DO DOM ─────────────────────────
   Selecionar uma vez é mais eficiente do que repetir querySelector.
   ─────────────────────────────────────────────────────────────── */
const arena        = document.getElementById("arena");
const scoreEl      = document.getElementById("score");
const livesDisplay = document.getElementById("lives-display");
const feedbackEl   = document.getElementById("feedback");
const streakEl     = document.getElementById("streak");
const overlay      = document.getElementById("overlay");
const startOverlay = document.getElementById("start-overlay");
const overlayScore = document.getElementById("overlay-score");
const overlayEmoji = document.getElementById("overlay-emoji");
const overlaySub   = document.getElementById("overlay-sub");
const btnHardware  = document.getElementById("btn-hardware");
const btnSoftware  = document.getElementById("btn-software");
const restartBtn   = document.getElementById("restart-btn");
const startBtn     = document.getElementById("start-btn");

/* ── 4. CONFIGURAÇÕES DO JOGO ────────────────────────────────────
   Centralizar facilita ajustar a dificuldade depois.
   ─────────────────────────────────────────────────────────────── */
const CONFIG = {
  spawnInterval: 2000,   // ms entre cada novo item (base)
  fallDuration:  5000,   // ms para cair do topo ao fundo (base)
  diffIncrement: 1.15,   // multiplicador de velocidade por nível
  diffInterval:  8000,   // ms entre cada aumento de dificuldade
  streakBonus:   5,      // pontos extra em streak (≥3 acertos)
  pointsCorrect: 10,     // pontos por acerto simples
  pointsWrong:  -5,      // penalização por erro
};

/* ── 5. SPAWN — criação de itens ─────────────────────────────────
   Cria um elemento HTML que "cai" na arena via animação CSS.
   ─────────────────────────────────────────────────────────────── */
function spawnItem() {
  const data     = ITEMS[Math.floor(Math.random() * ITEMS.length)];
  const xPos     = Math.random() * 80 + 10;          // posição horizontal (%)
  const duration = CONFIG.fallDuration / difficulty;  // mais rápido a cada nível

  const el = document.createElement("div");
  el.className = "falling-item";
  el.style.left              = `${xPos}%`;
  el.style.animationDuration = `${duration}ms`;
  el.dataset.type = data.type;
  el.dataset.name = data.name;

  el.innerHTML = `
    <div class="item-bubble" data-type="${data.type}">
      <span aria-hidden="true">${data.emoji}</span>
    </div>
    <span class="item-label">${data.name}</span>
  `;

  arena.appendChild(el);
  activeItems.push(el);

  /* Quando a animação termina = item saiu pelo fundo sem ser classificado
     → jogador perde uma vida */
  el.addEventListener("animationend", () => {
    if (el.parentNode) loseLife(el);
  });
}

/* ── 6. RESPOSTA — verificar se o clique está correto ────────────
   Encontra o item mais próximo do fundo e verifica o tipo.
   ─────────────────────────────────────────────────────────────── */
function handleAnswer(type) {
  if (!gameRunning || activeItems.length === 0) return;

  /* getBoundingClientRect() devolve a posição real no ecrã.
     O item com maior .top está mais próximo do fundo. */
  let lowestItem = null;
  let lowestTop  = -Infinity;

  activeItems.forEach(item => {
    const rect = item.getBoundingClientRect();
    if (rect.top > lowestTop) {
      lowestTop  = rect.top;
      lowestItem = item;
    }
  });

  if (!lowestItem) return;

  if (lowestItem.dataset.type === type) {
    handleCorrect(lowestItem);
  } else {
    handleWrong(lowestItem);
  }
}

/* ── 7. ACERTO ── */
function handleCorrect(el) {
  removeFromActiveItems(el);

  streak++;
  let points = CONFIG.pointsCorrect;

  if (streak >= 3) {
    points += CONFIG.streakBonus;
    showStreak(streak);
  } else {
    hideStreak();
  }

  score += points;
  updateScore();

  el.style.animation = "correctPop .35s ease forwards";
  showFeedback(`✓ +${points}`, "correct");
  el.addEventListener("animationend", () => el.remove(), { once: true });
}

/* ── 8. ERRO — item continua a cair, só perde pontos e streak ── */
function handleWrong(el) {
  streak = 0;
  hideStreak();
  score = Math.max(0, score + CONFIG.pointsWrong);
  updateScore();

  /* Reinicia animação com shake + queda do ponto atual */
  el.style.animation = "none";
  el.offsetHeight; // força reflow para reiniciar a animação CSS
  el.style.animation = "wrongShake .3s ease, fall linear forwards";
  el.style.animationDuration = `0.3s, ${getRemainingDuration(el)}ms`;

  arena.classList.add("flash-wrong");
  setTimeout(() => arena.classList.remove("flash-wrong"), 350);
  showFeedback("✗ Errado!", "wrong");
}

/* ── 9. PERDA DE VIDA — item chegou ao fundo ── */
function loseLife(el) {
  removeFromActiveItems(el);
  el.remove();
  lives--;
  streak = 0;
  hideStreak();
  updateLives();
  showFeedback("⚠ Perdeste uma vida!", "wrong");
  arena.classList.add("flash-wrong");
  setTimeout(() => arena.classList.remove("flash-wrong"), 350);
  if (lives <= 0) endGame();
}

/* ── 10. DIFICULDADE PROGRESSIVA ────────────────────────────────
   A cada diffInterval ms, aumenta a velocidade de queda.
   ─────────────────────────────────────────────────────────────── */
function startDifficultyRamp() {
  diffTimer = setInterval(() => {
    difficulty *= CONFIG.diffIncrement;
    clearInterval(spawnTimer);
    const newInterval = Math.max(800, CONFIG.spawnInterval / difficulty);
    spawnTimer = setInterval(spawnItem, newInterval);
  }, CONFIG.diffInterval);
}

/* ── 11. ATUALIZAÇÃO DO HUD ── */
function updateScore() {
  scoreEl.textContent = score;
}

function updateLives() {
  const hearts = livesDisplay.querySelectorAll(".life");
  hearts.forEach((heart, i) => {
    heart.classList.toggle("lost", i >= lives);
  });
}

/* ── 12. FEEDBACK VISUAL ── */
function showFeedback(message, type) {
  feedbackEl.textContent = message;
  feedbackEl.className   = "feedback";
  feedbackEl.offsetHeight; // força reflow para reiniciar animação
  feedbackEl.classList.add(type === "correct" ? "show-correct" : "show-wrong");
}

/* ── 13. STREAK BADGE ── */
function showStreak(count) {
  streakEl.textContent = `🔥 ${count}× Streak!`;
  streakEl.classList.add("visible");
}

function hideStreak() {
  streakEl.classList.remove("visible");
}

/* ── 14. UTILITÁRIOS ── */
function removeFromActiveItems(el) {
  const i = activeItems.indexOf(el);
  if (i !== -1) activeItems.splice(i, 1);
}

// Calcula tempo de queda restante (para re-animar após erro)
function getRemainingDuration(el) {
  const rect     = el.getBoundingClientRect();
  const arenaH   = arena.getBoundingClientRect().height;
  const progress = rect.top / arenaH; // 0 = topo, 1 = fundo
  return (1 - Math.max(0, Math.min(1, progress))) * (CONFIG.fallDuration / difficulty);
}

/* ── 15. INÍCIO / FIM / RESET ────────────────────────────────────
   startGame() → ativa timers e spawn
   endGame()   → para tudo, mostra game over
   resetGame() → reinicia estado para novo jogo
   ─────────────────────────────────────────────────────────────── */
function startGame() {
  gameRunning = true;
  spawnItem();
  spawnTimer = setInterval(spawnItem, CONFIG.spawnInterval);
  startDifficultyRamp();
}

function endGame() {
  gameRunning = false;
  clearInterval(spawnTimer);
  clearInterval(diffTimer);

  let emoji = "💀";
  let sub   = "Ficaste sem vidas!";
  if      (score >= 100) { emoji = "🏆"; sub = "Incrível! Tens talento para arquitetura!"; }
  else if (score >= 50)  { emoji = "👏"; sub = "Boa tentativa! Continua a estudar!"; }

  overlayEmoji.textContent = emoji;
  overlaySub.textContent   = sub;
  overlayScore.textContent = score;
  overlay.hidden = false;
}

function resetGame() {
  activeItems.forEach(el => el.remove());
  activeItems = [];
  score = 0; lives = 3; streak = 0; difficulty = 1;
  updateScore();
  updateLives();
  hideStreak();
  overlay.hidden = true;
  startGame();
}

/* ── 16. EVENT LISTENERS ── */
btnHardware.addEventListener("click", () => handleAnswer("hardware"));
btnSoftware.addEventListener("click", () => handleAnswer("software"));
restartBtn.addEventListener("click", resetGame);
startBtn.addEventListener("click", () => {
  startOverlay.hidden = true;
  startGame();
});

/* Teclado: ← / A = Hardware   → / D = Software */
document.addEventListener("keydown", e => {
  if (!gameRunning) return;
  if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") handleAnswer("hardware");
  if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") handleAnswer("software");
});
  </script>
